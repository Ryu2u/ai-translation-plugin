<h2>选择你喜欢的 UI 风格</h2>
<p class="subtitle">悬浮按钮和选中文字气泡的设计风格</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简风格</h3>
      <p>简洁线条，灰色调，适合喜欢干净界面的用户</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>毛玻璃风格</h3>
      <p>现代半透明效果，backdrop-filter 模糊背景</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>深色主题</h3>
      <p>暗黑配色，适合夜间使用，保护眼睛</p>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>科技感</h3>
      <p>蓝紫渐变，霓虹效果，视觉上更有冲击力</p>
    </div>
  </div>
</div>

<div class="mockup">
  <div class="mockup-header">悬浮按钮预览</div>
  <div class="mockup-body" style="display: flex; gap: 20px; justify-content: center; padding: 20px;">
    <div style="width: 60px; height: 60px; border-radius: 50%; background: #f0f0f0; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 24px;">译</div>
    <div style="width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 24px;">译</div>
    <div style="width: 60px; height: 60px; border-radius: 50%; background: #2d2d2d; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px;">译</div>
    <div style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px;">译</div>
  </div>
</div>
